version: "3.9"

services:
  traefik:
    image: traefik:v3.7.6
    container_name: connector-traefik
    restart: unless-stopped

    ports:
      - "80:80"

    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    networks:
      - jenkins-azure-connector

  connector-daemon:
    image: ${CONNECTOR_DAEMON_IMAGE}
    container_name: connector-daemon
    restart: unless-stopped

    expose:
      - "5739"

    environment:
      AzureClientOptions__OrganizationUrl: ${AZURE_ORGANIZATION_URL}
      AzureClientOptions__Pat: ${AZURE_PAT}
      ConnectionStrings__DefaultConnection: "Data Source=/data/jobs.db"
      PullRequestRefreshIntervalMinutes: ${PULL_REQUEST_REFRESH_INTERVAL_MINUTES}
      CommentingStrategy: ${COMMENTING_STRATEGY}

    volumes:
      - ${DATA_DIR}:/data

    networks:
      - jenkins-azure-connector

    labels:
      - traefik.enable=true
      - traefik.http.routers.daemon.rule=PathPrefix(`/api/v1/job-events`)
      - traefik.http.routers.daemon.entrypoints=web
      - traefik.http.services.daemon.loadbalancer.server.port=5739

  dashboard:
    image: ${CONNECTOR_DASHBOARD_IMAGE}
    container_name: connector-dashboard
    restart: unless-stopped

    expose:
      - "5741"

    environment:
      DaemonClientOptions__UrlBase: "http://connector-daemon:5739"

    depends_on:
      - connector-daemon

    networks:
      - jenkins-azure-connector

    labels:
      - traefik.enable=true
      - traefik.http.routers.dashboard.rule=PathPrefix(`/`)
      - traefik.http.routers.dashboard.entrypoints=web
      - traefik.http.services.dashboard.loadbalancer.server.port=5741

networks:
  jenkins-azure-connector:
    name: jenkins-azure-connector
    driver: bridge