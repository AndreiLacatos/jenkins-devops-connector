name: Build & Publish Docker Images

on:
  push:
    branches:
      - dev
      - master
    tags:
      - '*'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  docker:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: connector-daemon
            dockerfile: src/connector-daemon/Dockerfile

          - image: connector-dashboard
            dockerfile: src/dashboard/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              VERSION="${GITHUB_REF_NAME}"
          else
              BASE_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.1-alpha")

              case "${GITHUB_REF_NAME}" in
                  dev)
                      SUFFIX="-dev"
                      ;;
                  master)
                      SUFFIX="-staging"
                      ;;
                  *)
                      echo "Unsupported branch."
                      exit 1
                      ;;
              esac

              VERSION="${BASE_VERSION}${SUFFIX}-${GITHUB_RUN_NUMBER}"
          fi

          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Determine image tags
        shell: bash
        run: |
          IMAGE="${REGISTRY}/${IMAGE_PREFIX}/${{ matrix.image }}"

          TAGS="${IMAGE}:${VERSION}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              TAGS="${TAGS},${IMAGE}:latest"
          elif [[ "${GITHUB_REF_NAME}" == "master" ]]; then
              TAGS="${TAGS},${IMAGE}:latest"
          elif [[ "${GITHUB_REF_NAME}" == "dev" ]]; then
              TAGS="${TAGS},${IMAGE}:latest-dev"
          fi

          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          echo "TAGS=${TAGS}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max